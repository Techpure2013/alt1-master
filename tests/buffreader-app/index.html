<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="alt1:configurl" content="appconfig.json">
	<title>Buff Reader</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; font-size: 13px; overflow-x: hidden; }

		.header { background: #16213e; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
		.header h1 { font-size: 14px; font-weight: 600; color: #e94560; }
		.header .status { font-size: 11px; color: #666; }
		.header .status.active { color: #00cc66; }

		.toolbar { padding: 6px 12px; background: #16213e; display: flex; gap: 6px; align-items: center; border-bottom: 1px solid #0f3460; }
		button { background: #0f3460; color: #ccc; border: 1px solid #1a4080; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
		button:hover { background: #1a4080; color: #fff; }
		button.primary { background: #e94560; border-color: #e94560; color: #fff; }
		button.primary:hover { background: #d63050; }
		button.active { background: #00aa55; border-color: #00aa55; color: #fff; }
		button:disabled { opacity: 0.4; cursor: default; }
		select { background: #0f3460; color: #ccc; border: 1px solid #1a4080; padding: 4px 6px; border-radius: 4px; font-size: 12px; }
		label { font-size: 11px; color: #888; }

		.content { padding: 8px 12px; }
		.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 4px; }
		.section-label.buff { color: #00cc66; }
		.section-label.debuff { color: #e94560; }

		.buff-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
		.buff-item { display: flex; align-items: center; gap: 8px; background: #16213e; border-radius: 4px; padding: 6px 10px; border-left: 3px solid #0f3460; transition: border-color 0.3s; }
		.buff-item.has-timer { border-left-color: #00cc66; }
		.buff-item.debuff-item { border-left-color: #e94560; }
		.buff-item.expiring { border-left-color: #ff8800; animation: pulse 1s infinite; }

		.buff-icon { width: 25px; height: 25px; border-radius: 3px; background: #0a0a1a; image-rendering: pixelated; flex-shrink: 0; }
		.buff-info { flex: 1; min-width: 0; }
		.buff-timer { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
		.buff-timer.green { color: #00ff88; }
		.buff-timer.yellow { color: #ffcc00; }
		.buff-timer.red { color: #ff4444; }
		.buff-timer.none { color: #444; font-size: 14px; }
		.buff-slot { font-size: 10px; color: #555; }

		.empty-state { text-align: center; padding: 30px 20px; color: #555; }
		.empty-state .icon { font-size: 28px; margin-bottom: 8px; }
		.empty-state p { margin: 4px 0; }

		.stats-bar { display: flex; gap: 12px; padding: 6px 12px; background: #111122; font-size: 11px; color: #555; border-top: 1px solid #0f3460; position: fixed; bottom: 0; left: 0; right: 0; }
		.stats-bar span { display: flex; align-items: center; gap: 4px; }
		.stats-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
		.stats-bar .dot.on { background: #00cc66; }
		.stats-bar .dot.warn { background: #ff8800; }

		.error-bar { padding: 6px 12px; background: #2a1020; color: #ff6666; font-size: 11px; display: none; }
		.error-bar.show { display: block; }

		@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
	</style>
</head>
<body>
	<div class="header">
		<h1>Buff Reader</h1>
		<div class="status" id="status">Not connected</div>
	</div>
	<div class="toolbar">
		<button class="primary" id="btnStart">Start</button>
		<button id="btnStop" disabled>Stop</button>
		<label>Every <select id="interval">
			<option value="200">200ms</option>
			<option value="300" selected>300ms</option>
			<option value="500">500ms</option>
			<option value="1000">1s</option>
		</select></label>
	</div>
	<div class="error-bar" id="error"></div>
	<div class="content" id="content">
		<div class="empty-state" id="emptyState">
			<div class="icon">&#9876;</div>
			<p><b>No buffs detected</b></p>
			<p>Click Start to begin scanning</p>
		</div>
		<div id="buffSection" style="display:none">
			<div class="section-label buff">Buffs</div>
			<div class="buff-list" id="buffList"></div>
		</div>
		<div id="debuffSection" style="display:none">
			<div class="section-label debuff">Debuffs</div>
			<div class="buff-list" id="debuffList"></div>
		</div>
	</div>
	<div class="stats-bar">
		<span><div class="dot" id="dotStatus"></div> <span id="statsText">Idle</span></span>
		<span id="statsReads"></span>
	</div>

	<script src="/base/index.js"></script>
	<script src="/ocr/index.js"></script>
	<script src="/buffs/index.js"></script>
	<script>
	(function() {
		var BuffReader = (window.Buffs && window.Buffs.default) || null;
		var buffReader = null;
		var debuffReader = null;
		var timer = null;
		var reads = 0;
		var errors = 0;
		var lastBuffCount = 0;
		var lastDebuffCount = 0;

		var elStatus = document.getElementById('status');
		var elError = document.getElementById('error');
		var elEmpty = document.getElementById('emptyState');
		var elBuffSection = document.getElementById('buffSection');
		var elDebuffSection = document.getElementById('debuffSection');
		var elBuffList = document.getElementById('buffList');
		var elDebuffList = document.getElementById('debuffList');
		var elDot = document.getElementById('dotStatus');
		var elStatsText = document.getElementById('statsText');
		var elStatsReads = document.getElementById('statsReads');

		function setStatus(msg, active) {
			elStatus.textContent = msg;
			elStatus.className = 'status' + (active ? ' active' : '');
		}

		function setError(msg) {
			elError.textContent = msg;
			elError.className = 'error-bar' + (msg ? ' show' : '');
		}

		function getTimerColor(text) {
			if (!text) return 'none';
			var val = parseInt(text);
			if (isNaN(val)) return 'green';
			if (text.indexOf('m') !== -1) return val <= 2 ? 'yellow' : 'green';
			if (text.indexOf('hr') !== -1 || text.indexOf('K') !== -1) return 'green';
			if (text.indexOf('%') !== -1) return val < 30 ? 'red' : val < 60 ? 'yellow' : 'green';
			if (text.indexOf('.') !== -1) return 'red';
			return val <= 5 ? 'red' : val <= 15 ? 'yellow' : 'green';
		}

		function isExpiring(text) {
			if (!text) return false;
			if (text.indexOf('.') !== -1) return true;
			var val = parseInt(text);
			if (text.indexOf('m') === -1 && text.indexOf('hr') === -1 && text.indexOf('K') === -1 && text.indexOf('%') === -1) {
				return val <= 5;
			}
			return false;
		}

		function renderBuffItem(timer, index, isDebuff) {
			var color = getTimerColor(timer);
			var expiring = isExpiring(timer);
			var cls = 'buff-item';
			if (isDebuff) cls += ' debuff-item';
			else if (timer) cls += ' has-timer';
			if (expiring) cls += ' expiring';
			return '<div class="' + cls + '">' +
				'<div class="buff-info">' +
				'<div class="buff-timer ' + color + '">' + (timer || '--') + '</div>' +
				'<div class="buff-slot">' + (isDebuff ? 'Debuff' : 'Buff') + ' ' + index + '</div>' +
				'</div></div>';
		}

		function findBars() {
			setError('');
			if (typeof alt1 === 'undefined') {
				setError('Alt1 not detected. Open this inside Alt1 Toolkit.');
				return false;
			}

			buffReader = new BuffReader();
			buffReader.debuffs = false;
			var foundBuff = buffReader.find();

			debuffReader = new BuffReader();
			debuffReader.debuffs = true;
			var foundDebuff = debuffReader.find();

			if (!foundBuff && !foundDebuff) {
				setError('Could not find buff or debuff bar. Make sure the game is visible.');
				return false;
			}

			var parts = [];
			if (foundBuff) parts.push('Buffs at [' + buffReader.pos.x + ',' + buffReader.pos.y + ']');
			if (foundDebuff) parts.push('Debuffs at [' + debuffReader.pos.x + ',' + debuffReader.pos.y + ']');
			setStatus(parts.join(' | '), true);
			return true;
		}

		function readAll() {
			reads++;
			setError('');
			var buffHtml = '';
			var debuffHtml = '';
			var buffCount = 0;
			var debuffCount = 0;

			if (buffReader && buffReader.pos) {
				try {
					var rect = buffReader.getCaptRect();
					if (rect) {
						var buf = A1lib.capture(rect.x, rect.y, rect.width, rect.height);
						var buffs = buffReader.read(buf);
						if (buffs && buffs.length > 0) {
							buffCount = buffs.length;
							for (var i = 0; i < buffs.length; i++) {
								var arg = '';
								try { var r = buffs[i].readArg('arg'); arg = r.arg || ''; } catch(e) {}
								buffHtml += renderBuffItem(arg, i, false);
							}
						}
					}
				} catch(e) { setError('Buff read error: ' + e.message); errors++; }
			}

			if (debuffReader && debuffReader.pos) {
				try {
					var rect2 = debuffReader.getCaptRect();
					if (rect2) {
						var buf2 = A1lib.capture(rect2.x, rect2.y, rect2.width, rect2.height);
						var debuffs = debuffReader.read(buf2);
						if (debuffs && debuffs.length > 0) {
							debuffCount = debuffs.length;
							for (var i = 0; i < debuffs.length; i++) {
								var arg = '';
								try { var r = debuffs[i].readArg('arg'); arg = r.arg || ''; } catch(e) {}
								debuffHtml += renderBuffItem(arg, i, true);
							}
						}
					}
				} catch(e) { setError('Debuff read error: ' + e.message); errors++; }
			}

			elBuffList.innerHTML = buffHtml;
			elDebuffList.innerHTML = debuffHtml;
			elBuffSection.style.display = buffCount > 0 ? '' : 'none';
			elDebuffSection.style.display = debuffCount > 0 ? '' : 'none';
			elEmpty.style.display = (buffCount === 0 && debuffCount === 0) ? '' : 'none';

			if (buffCount !== lastBuffCount || debuffCount !== lastDebuffCount) {
				lastBuffCount = buffCount;
				lastDebuffCount = debuffCount;
			}

			elDot.className = 'dot on';
			elStatsText.textContent = 'Reading';
			elStatsReads.textContent = reads + ' reads' + (errors > 0 ? ' / ' + errors + ' err' : '');
			setTimeout(function() { elDot.className = 'dot'; }, 100);
		}

		function start() {
			if (timer) return;
			if (!buffReader || !buffReader.pos) {
				if (!findBars()) return;
			}
			var ms = parseInt(document.getElementById('interval').value);
			timer = setInterval(readAll, ms);
			document.getElementById('btnStart').disabled = true;
			document.getElementById('btnStop').disabled = false;
			elDot.className = 'dot on';
			elStatsText.textContent = 'Active';
			readAll();
		}

		function stop() {
			if (timer) { clearInterval(timer); timer = null; }
			document.getElementById('btnStart').disabled = false;
			document.getElementById('btnStop').disabled = true;
			elDot.className = 'dot';
			elStatsText.textContent = 'Stopped';
		}

		document.getElementById('btnStart').onclick = start;
		document.getElementById('btnStop').onclick = stop;

		if (typeof alt1 !== 'undefined') {
			alt1.identifyAppUrl('./appconfig.json');
			setStatus('Connected to Alt1', false);
		} else {
			setStatus('Alt1 not detected', false);
		}
	})();
	</script>
</body>
</html>
